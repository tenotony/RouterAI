# ============================================
#  🔀 RouterAI — Free AI Model Router for OpenClaw
#  docker compose up -d
# ============================================

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: routerai-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8900:8900"
    volumes:
      - routerai-data:/app/data
      - routerai-config:/app/config
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      - ROUTERAI_PORT=8900
      - ROUTERAI_HOST=0.0.0.0
      # Set this to protect /v1/* endpoints (optional)
      # - ROUTERAI_API_KEY=your-secret-key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - routerai-net

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: routerai-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8899:8899"
    volumes:
      - routerai-data:/app/data
      - routerai-config:/app/config
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      - PROXY_URL=http://proxy:8900
      - DASHBOARD_PORT=8899
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - routerai-net

networks:
  routerai-net:
    driver: bridge

volumes:
  routerai-data:
    name: routerai-data
  routerai-config:
    name: routerai-config
