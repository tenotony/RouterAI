# ============================================
#  🔀 RouterAI — Unified Server (Docker)
#  docker compose up -d
# ============================================

services:
  routerai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: routerai
    restart: unless-stopped
    ports:
      - "${ROUTERAI_PORT:-8900}:8900"
    volumes:
      - routerai-data:/app/data
      - routerai-config:/app/config
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      - ROUTERAI_PORT=8900
      - ROUTERAI_HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Set this to protect /v1/* endpoints (optional)
      # - ROUTERAI_API_KEY=your-secret-key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - routerai-net

networks:
  routerai-net:
    driver: bridge

volumes:
  routerai-data:
    name: routerai-data
  routerai-config:
    name: routerai-config
